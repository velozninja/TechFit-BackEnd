spring:
  logging:
    level:
      org:
        springframework:
          security=DEBUG:
  application:
    name: TechFit

  datasource:
    url: ${url_db}
    username: ${name}
    password: ${password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:

  port: 8080
jwt:
  expiration: ${expiration}
  key: ${key}